我說依貪火瞋火癡火是燃依生老病死憂悲苦惱愁是燃有如是之經耶自然他是故一切行是無區別為煻煨三自一切行無區別為煻煨耶他然自非世尊所仰耶曰諸比丘此為五妙欲何等為五耶眼所識之色為可愛可親可意妙好可悅可欲者耳所識之聲鼻所識之香乃至舌所識之味乃至身所識觸之可愛可親可意妙好可悅可欲者諸比丘實此等為五妙欲有如是之經耶他然自是故不應言一切行無區別為煻煨四他不應言一切行無區別為煻煨耶自然他然非世尊所仰耶曰諸比丘汝等之得汝等之領得依梵行住為剎那之領會諸比丘依我所見名地獄之六觸處於其處依眼而見如何之色耶唯見不可愛色而非可愛色唯見不可親色而非可親色唯見不可意色而非可意色依耳而聞如何之聲耶乃至依鼻而嗅如何之香耶乃至依舌而覺如何之味耶乃至依身而觸知如何之觸耶乃至依意而知如何之法耶唯知不可愛色而非可愛色唯知不可親色而非可親色唯知不可意色而非可意色有如是之經耶自然他是故一切行無區別為煻煨五自一切行無區別為煻煨耶他然自非世尊所仰耶曰諸比丘汝等之得汝等之領得是依梵行住為剎那之領會諸比丘依我所見名天之六觸處於其處依眼而見如何之色耶唯見可愛色而非不可愛色唯見可親色而非不可親色唯見可意色而非不可意色依耳而聞如何之聲耶乃至依鼻而嗅如何之香耶乃至依舌而覺如何之味耶乃至依身而觸知如何之觸耶乃至依意而知如何之法耶唯知可愛色非而不可愛色唯知可親色而非不可親色唯知可意色而非不可意色有如是之經耶他然自是故不應言一切行無區別為煻煨六他不應言一切行無區別為煻煨耶自然他世尊所仰曰無常是苦一切行非為無常耶自然他若世尊所仰曰無常是苦一切行為無常是故汝應言一切行無區別為煻煨七自一切行為煻煨耶他然自施是不可愛果不可親果不可意果不純果苦根苦異熟耶他實不應如是言乃至自戒乃至布薩乃至修乃至梵行是不可愛果不可親果不可意果不純果苦根苦異熟耶他實不應如是言乃至自施非是可愛果可親果可意果純正果樂根樂異熟耶他然自若施是可愛果可親果可意果純正果樂根樂異熟汝不應言一切行無區別為煻煨自戒乃至布薩乃至梵行非是可愛果可親果可意果純正果樂根樂異熟耶他然自若梵行是可愛果可親果可意果純正果樂根樂異熟汝不應言一切行無區別為煻煨八自一切行無區別為煻煨耶他然自非世尊所仰耶曰知足見聞其法者獨居樂於世間不瞋恚對生有制己者樂於世間離貪欲超脫諸欲者樂我慢調伏者實最上樂依安樂而得此樂是為究竟樂得三明是為最上樂有如是之經耶他然自是故不應言一切行無區別為煻煨第九章漸現觀論今名漸現觀論此處彼執智者少許剎那剎那捨己垢如金工淨銀等之經為不如理預流果作證向者一分之煩惱依見苦而捨一分依見集滅道而捨餘亦如是如是依十六之區分次第斷煩惱而得阿羅漢如是生各別現觀之邪執者乃現在之安達派說一切有部正量部賢胄部一自漸現觀耶他然自漸漸修預流道耶他實不應如是言乃至自漸漸修預流道耶他然自漸漸證預流果耶他實不應如是言乃至二自漸現觀耶他然自漸漸修一來道耶他實不應如是言乃至自漸漸修一來道耶他然自漸漸證一來果耶他實不應如是言乃至三自漸現觀耶他然自漸漸修不還道耶他實不應如是言乃至自漸漸修不還道耶他然自漸漸證不還果耶他實不應如是言乃至四自漸現觀耶他然自漸漸修阿羅漢道耶他實不應如是言乃至自漸漸修阿羅漢道耶他然自漸漸證阿羅漢果耶他實不應如是言乃至五自預流果作證向補特伽羅者依見苦而捨何耶他乃有身見猶豫戒禁取此乃捨一類煩惱四分之一自四分一是預流四分一非預流耶四分一是得逮得到達證具足住身證住四分一是不身證住耶四分一是極七返有具足家家一間佛證淨乃至法乃至僧乃至聖所愛戒具足四分一是聖所愛戒不具足耶他實不應如是言乃至六自依見集乃至依見滅乃至依見道而捨何耶他乃有身見猶豫戒禁取此乃捨一類煩惱四分之一自四分一是預流四分一非預流耶四分一是得逮得到達證具足住身證住四分一是不身證住耶四分一是極七返有具足家家一間佛證淨乃至法乃至僧乃至聖所愛戒具足四分一者是聖所愛戒不具足耶他實不應如是言乃至七自一來果作證向補特伽羅是依見苦而捨何耶他乃粗貪欲粗瞋恚此乃捨一類煩惱四分之一自四分一是一來四分一非一來四分一是得逮得到達證具足住身證住四分一是不身證住耶他實不應如是言乃至自依見集乃至依見滅乃至依見道而捨何耶他乃粗貪欲粗瞋恚此乃捨一類煩惱四分之一自四分一是一來四分一非一來四分一是得逮得到達證具足住身證住四分一是不身證住耶他實不應如是言乃至八自不還果作證向補特伽羅依見苦而捨何耶他乃微俱行貪欲微俱行瞋恚此乃捨一類煩惱四分之一自四分一是不還四分一非不還四分一是得逮得到達證具足住身證住四分一是不身證住耶四分一是中般涅槃乃至生般涅槃乃至無行般涅槃乃至有行般涅槃乃至上流色究竟天趣生四分一非上流色究竟趣生耶他實不應如是言乃至自依見集乃至依見滅乃至依見道而捨何耶他乃微俱行貪欲微俱行瞋恚此乃捨一類煩惱四分之一是不還四分一非不還四分一是得逮得到達證具足住身證住四分一是不身證住耶四分一是中般涅槃乃至生般涅槃乃至無行般涅槃乃至有行般涅槃乃至上流色究竟趣生四分一非上流色究竟趣生耶他實不應如是言乃至九自阿羅漢果作證向補特伽羅依見苦而捨何耶他乃色貪無色貪慢掉舉無明此乃捨一類煩惱四分之一自四分一是阿羅漢四分一非阿羅漢四分一是阿羅漢果得逮得到達證具足住身證住四分一不身證住耶四分一是離貪離瞋離癡所作已成棄諸重擔逮得己利盡諸有結正智解脫拔閂充溝拔毒箭離桎梏聖者降高幢降諸重擔離縛優勝苦遍知斷集證滅修道知所知遍知所遍知捨所棄修所修乃至證所證四分一是不證所證耶他實不應如是言乃至自依見集乃至依見滅乃至依見道而捨何耶他乃色貪無色貪慢掉舉無明者此乃捨一類煩惱四分之一自四分一是阿羅漢四分一非阿羅漢乃至證所證四分一是不證所證耶他實不應如是言乃至一自見預流果作證向補特伽羅之苦者應言向者耶他然自於見苦之時應言住果耶他實不應如是言乃至於見集乃至見滅者應言向者耶他然自於見滅之時應言住果耶他實不應如是言乃至一一自見預流果作證向補特伽羅之道應言向者於見道之時應言住果耶他然自見苦應言向者於見苦之時應言住果耶他實不應如是言乃至自見道應言向者於見道之時應言住果耶他然自見集乃至見滅應言向者於見滅之時應言住果耶他實不應如是言乃至一二自見預流果作證向補特伽羅之苦應言向者於見苦之時不應言住果耶他然自見道應言向者不應言於見道之時應言住果耶他實不應如是言乃至自見集乃至見滅應言向者不應言於見滅之時應言住果耶他然自見道應言向者不應言於見道之時應言住果耶他實不應如是言乃至一三自見預流果作證向補特伽羅之苦應言向者不應言於見苦之時應言住果耶他然自見苦是無價值耶他實不如是言乃至自見集乃至見滅應言向者不應言於見滅之時應言住果耶他然自滅見是無價值耶他實不應如是言乃至一四他於見苦之時能見四諦耶自然他苦諦是四諦耶自實不應如是言乃至自見色蘊是無常時能見五蘊是無常耶他然自色蘊是五蘊耶他實不應如是言乃至一五自能見眼處是無常時能見十二處是無常耶他然自眼處是十二處耶他實不應如是言乃至自能見眼界是無常時能見十八界是無常耶他然自眼界是十八界耶他實不應如是言乃至自能見眼根是無常時能見二十二根是無常耶他然自眼根是二十二根耶他實不應如是言乃至一六自依四智而證預流果耶他然自有四預流果耶他實不應如是言乃至自依八智而證預流果耶他然自有八預流果耶他實不應如是言乃至自依十二智而證預流果耶他然自有十二預流果耶他實不應如是言乃至自依四十四智而證預流果耶他然自有四十四預流果耶他實不應如是言乃至自依七十七智而證預流果耶他然自有七十七預流果耶他實不應如是言乃至一七他不應言漸現觀耶自然他非世尊所仰耶曰諸比丘恰如大海之次第而深次第而趣向次第而臨入忽不陷沒諸比丘如是於此法律亦有次第之學次第之作次第之道無忽而智慧通達有如是之經耶自然他是故是漸現觀一八他不應言漸現觀耶自然他非世尊所仰耶曰智者漸次少許剎那剎那如金工吹銀垢法除己之垢有如是之經耶自然他是故為漸現觀一九自漸現觀耶他然自具壽憍梵波提長老非對比丘如是言耶曰友我自世尊面受而聞面受而領得諸比丘欲見苦者亦可見苦集亦可見苦滅亦可見至苦滅之道見苦之集者亦可見苦亦可見苦之滅亦可見至苦滅之道見苦滅者亦可見苦亦可見苦集亦可見至苦滅之道見至苦滅之道者亦可見苦亦可見苦集亦可見苦滅有如是之經耶他然自是故不應言是漸現觀二自漸現觀耶他然自非世所仰耶曰見具是之同特大品四章參照乃至行六四罪乃不可能有如是之經耶他然自是故不應言漸現觀二一自漸現觀耶自非世尊所仰耶曰諸比丘其時集法之一切是滅法聖聲聞遠塵離垢法眼生諸比丘隨著見生聖聲聞俱合三結乃身見猶豫戒禁取有如是之經耶他然自是故不應言漸現觀第十章言說論今名言說論此處言佛世尊以出世間之言說而語之彼邪執乃現在之安達派一自佛世尊之言說是出世間耶他然自衝受於出世間耳而知依出世間識衝知而非依世間之識聲聞衝知凡夫不然耶他實不應如是言乃至自佛世尊之言說非衝受於世間耳耶他然自若佛世尊之言說衝受於世間之耳汝不應言佛世尊之言說是出世間自佛世尊之言說非依世間識而衝知耶他然自若佛世尊之言說依世間識而衝知者汝不應言佛世尊之言說是出世間自佛世尊之言說凡夫不衝知耶他然自若佛世尊之言說凡夫衝知者汝不應言佛世尊之言說是出世間二自佛世尊之言說是出世間耶他然自是道果涅槃預流道預流果一來道一來果不還道不還果阿羅漢道阿羅漢果念處正勤神足根力覺支耶他實不應如是言乃至三自佛世尊之言說是出世間耶他然自任何人亦聞佛世尊之言說耶他然自出世間法是耳所識衝受於耳入耳識之境界耶他實不應如是言乃至自出世間法非耳所識不衝受於耳非不入耳識之境界耶他然自若出世間法非耳所識不衝受於耳不入耳識之境界汝不應言佛世尊之言說是出世間四自佛世尊之言說是出世間耶他然自於佛世尊之言說有染著耶他然自出世間法是貪之本是順染順欲順惑順縛順迷耶他實不應如是言乃至自出世間法非是貪之本非不順染不順欲不順惑不順縛不順迷耶他然自若出世間法非是貪之本不順染不順欲不順惑不順縛不順迷者汝不應言佛世尊之言說是出世間五自佛世尊之言說是出世間耶他然自有損害佛世尊之言說耶他然自出世間法是瞋之本怒之本嫌之本耶他實不應如是言乃至自出世間法非瞋之本非怒之本非嫌之本耶他然自若出世間法非瞋之本非怒之本非嫌之本者汝不應言佛世尊之言說是出世間六自佛世尊之言說是出世間耶他然自於佛世尊之言說有惑耶他然自出世間法是癡之本無知之所作無眼之所作滅慧者入迷者導無涅槃者耶他實不應如是言乃至自出世間法非不為癡之本非無知之所作非無眼之所作是令覺慧者入無迷者導涅槃者耶他然自若出世間法非癡之本非無知之所作非無眼之所作是令覺慧者入無迷者導涅槃者汝不應言佛世尊之言說是出世間七自佛世尊之言說是出世間耶他然自聞佛世尊之言說者一切之彼等修道耶他實不如是言乃至自聞佛世尊之言說者一切之彼等修道耶他然自愚凡夫聞佛世尊之言說愚凡夫修道耶他實不應如是言乃至自殺母者殺父者殺阿羅漢者出佛身血者破僧伽者聞佛世尊之言說破僧伽者修道耶他實不應如是言乃至八他以金杖指示而得穀物之集積妙色之集積耶自然他如是世尊依出世間之言說說世法與出世法自依萆麻子油草指示而得穀物之集積妙色之集積耶他然自如是世尊依世間之言說說世法與出世間法皆世尊法九自佛世尊之言說者語世間是世間語出世間是出世間耶他然自世間言說之時衝受於世間之耳出世間之言說時衝受於出世間之耳世間之言說時依世間識而領會出世間之言說時依出世間之識而領會世間言說之時依凡夫而領會出世間之言說時依聲聞而領會耶他實不如是言乃至一他不應言佛世尊之言說語世間是世間語出世間是出世間耶自然他世法出世法非世尊所說耶自然他若世法與出世法是世尊所說者是故汝應言佛世尊之言說語出間是世間語出世間是出世間一一自佛世尊之言說語世間是世間語出世間是出世間耶他然自道是道語非道是非道語果是果語非果是非果語涅槃是涅槃語非涅槃是非涅槃語有為是有為語無為是無為語色是色語無色是無色語受是受語無受是無受語想是想語無想是無想語行是行語無行為是行語識為識語無識是無識耶他實不如是言乃至第十一章滅論今名滅論此處有以非擇滅與擇滅以二為一而為滅諦之邪執乃現在之化地部與安達派一自有二滅耶他然自有二苦滅耶他實不如是言乃至自有二苦滅耶他然自有二滅諦耶他實不如是言乃至自有二滅諦耶他然自有二苦諦耶他實不如是言乃至自有二滅諦耶他然自有二集諦耶他實不如是言乃至自有二滅諦耶他然自有二道諦耶他實不如是言乃至自有二滅諦耶他然自有二護乃至二住二救護二依護二不動二不死乃至二涅槃耶他實不如是言乃至自有二涅槃耶他然自於二涅槃有上下劣勝高下界區分界線中間耶他實不如是言乃至二自有二滅耶他然自非簡擇非擇滅諸行而滅耶他然自若簡擇非擇滅諸行而滅者汝不應言有二滅三他不應言有二滅耶自然他非擇滅諸行者畢竟破壞擇滅諸行者非畢竟破壞耶自然他若非擇滅諸行者畢竟破壞擇滅諸行者亦畢竟破壞是故汝應言有二滅四有二滅耶他然自擇滅諸行者入聖道而滅耶他然自非擇滅諸行者入聖道而滅耶他實不應如是言乃至五自有二滅耶他然自擇滅諸行者不再生耶他然自非擇滅諸行者不再生耶他實不應如是言乃至自是故不應言有二滅彼之攝頌曰他所與無知猶豫他令入語發表苦導入住煻煨行其中一現觀一言說一滅第二品終
