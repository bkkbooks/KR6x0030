body:
  text: 第二品第一章他所與論今有名他所與論此處不得承認阿羅漢時依未得為已得之思而增上慢綺語宣言為阿羅漢者而見漏精認為魔衆天近於阿羅漢而與不淨是現在之東山住部西山住部一自阿羅漢有漏不淨耶他然自阿羅漢有貪欲貪欲貪纏欲貪結欲暴流欲軛欲欲蓋耶他實不應如是言乃至自阿羅漢無貪欲貪欲貪纏欲貪結欲暴流欲軛欲欲蓋耶他然自若阿羅漢是無貪欲貪欲貪纏欲貪結欲暴流欲軛欲欲蓋者實汝不應言阿羅漢有漏不淨二自於凡夫有漏不淨彼有貪欲欲貪纏欲貪結欲暴流欲軛欲欲蓋耶他然自阿羅漢有漏不淨而彼有貪欲貪欲貪纏乃至欲欲蓋耶他實不應如是言乃至自阿羅漢有漏不淨彼無貪欲貪欲貪纏乃至欲欲蓋耶他然自凡夫有漏不淨彼無貪欲貪欲貪纏乃至欲欲蓋耶他實不應如是言乃至三自阿羅漢有漏不淨耶他然自如何而有耶他實魔衆天齊來於阿羅漢漏不淨自魔衆天齊來於阿羅漢漏不淨耶他然自魔衆天有漏不淨耶他實不應如是言乃至自魔衆天無漏不淨耶他然自若魔衆天無漏不淨實汝不應言魔衆天齊來於阿羅漢漏不淨四自魔衆天齊來於阿羅漢漏不淨耶他然自魔衆天己齊來漏不淨耶齊來其他之漏不淨耶齊來彼阿羅漢之漏不淨耶他實不應如是言乃至自魔衆天非己非他非彼齊來於阿羅漢之漏不淨耶他然自若魔衆天非己非他非彼齊來於阿羅漢之漏不淨實汝不應言魔衆天齊來於阿羅漢漏不淨五自魔衆天齊來於阿羅漢漏不淨耶他然自由毛孔齊來耶他實不應如是言乃至自魔衆天齊來於阿羅漢漏不淨耶他然自依如何之原因耶他魔衆天實令於阿羅漢有疑自阿羅漢有疑耶他實不應如是言乃至自阿羅漢有疑耶他然自有阿羅漢於師之疑法疑僧伽之疑學之疑前際之疑後際之疑前後際之疑相依性緣起法之疑耶他實不應如是言乃至自阿羅漢無於師之疑法之疑僧伽之疑學之疑前際之疑後際之疑前後際之疑相依性緣起法之疑耶他然自若阿羅漢無於師之疑乃至相依性緣起法之疑實汝不應言阿羅漢有疑六自於凡夫有疑有於彼師之疑乃至相依性緣起法之疑耶他然自阿羅漢有疑有於彼師之疑乃至相依性緣起法之疑耶他實不應如是言乃至自阿羅漢有疑無於彼師之疑乃至相依性緣起法之疑耶他然自於凡夫有疑無於彼師疑乃至相依性緣起法之疑耶他實不應如是言乃至七自阿羅漢有漏不淨耶他然自阿羅漢之漏不淨者是何之等流耶他乃食飲嚙味之等流自阿羅漢之漏不淨者乃食飲嚙味之等流耶他然自凡食飲嚙味一切之物有漏不淨耶他實不應如是言乃至自凡食飲嚙味一切之物有漏不淨耶他然自於兒食飲嚙味而兒有漏不淨耶他實不應如是言乃至自於不能男食飲嚙味而不能男有漏不淨耶他實不應如是言乃至自於天食飲嚙味而天有漏不淨耶他實不應如是言乃至八自阿羅漢之漏不淨者是食飲嚙味之等流耶他然自有其依處耶他實不應如是言乃至自阿羅漢之大小便者是食飲嚙味之等流而有其依處耶他然自阿羅漢之漏不淨者是食飲嚙味之等流而有其依處耶他實不應如是言乃至自阿羅漢之漏不淨者是食飲嚙味之等流而無其依處耶他然自阿羅漢之大小便是食飲嚙味之等流而無其依處耶他實不應如是言乃至九自阿羅漢有漏不淨耶他然自阿羅漢求淫法行淫法求兒所圍繞之床還求迦尸國之旃檀欲持纏衣軟膏受金銀耶他實不應如是言乃至自凡夫有漏不淨凡夫求淫法乃至受金銀耶他然自阿羅漢有漏不淨阿羅漢求淫法乃至受金銀耶他實不應如是言乃至自阿羅漢有漏不淨阿羅漢不求淫法乃至不受金銀耶他然自凡夫有漏不淨凡夫不求淫法不行淫法不求兒所圍繞之床不還求迦尸國之旃檀不欲持纏衣軟膏不受金銀耶他實不應如是言乃至一自阿羅漢有漏不淨耶他然自阿羅漢捨貪如絶根斷多羅之幹歸無有不為未來不生法耶他然自若阿羅漢捨貪如絶根斷多羅之幹歸無有為未來不生法實汝不應言阿羅漢有漏不淨自阿羅漢有漏不淨耶他然自阿羅漢捨瞋乃至捨癡捨慢捨見捨疑捨惛沈捨掉舉捨無慚乃至捨無愧如絶根斷多羅之幹歸無有非為未來不生法耶他然自若阿羅漢捨無愧如絶根斷多羅之幹歸無有為未來不生法實汝不應言阿羅漢有漏不淨一一自阿羅漢有漏不淨耶他然自阿羅漢非捨貪而修道耶他然自若阿羅漢捨貪而修道者實汝不應言阿羅漢有漏不淨自阿羅漢有漏不淨耶他然自阿羅漢非捨貪而修處乃至修正勤修神足修根修力乃至修覺支耶他然自若阿羅漢捨貪乃至修覺支實汝不應言阿羅漢有漏不淨一二自阿羅漢有漏不淨耶他然自阿羅漢非捨瞋乃至捨癡乃至捨無愧修道乃至修行覺支耶他然自若阿羅漢捨無愧乃至修行覺支實汝不應言阿羅漢有漏不淨一三自阿羅漢有漏不淨耶他然自阿羅漢非離貪離瞋離癡所作已成棄諸重擔逮得己利盡諸有結正智解脫拔閂充溝拔毒箭離桎梏聖者降高幢降諸重擔離縛優勝苦遍知集斷滅證道修知所知遍知所遍知斷所斷修所修證所證耶他然自若阿羅漢離貪離瞋所作已成乃至證所證實汝不應言阿羅漢有漏不淨一四自阿羅漢有漏不淨耶他善巧於自法之阿羅漢有漏不淨善巧於他法之阿羅漢無漏不淨自善巧於自法之阿羅漢有漏不淨耶他然自善巧於他法之阿羅漢有漏不淨耶他實不應如是言乃至自善巧於他法之阿羅漢無漏不淨耶他然自善巧於自法之阿羅漢無不淨漏精耶他實不應如是言乃至一五自善巧於自法之阿羅漢捨貪彼有漏不淨耶他然自善巧於他法之阿羅漢捨貪彼有漏不淨耶他實不應如是言乃至自善巧於自法之阿羅漢捨瞋捨癡乃至捨無愧彼有漏不淨耶他然自善巧於他法之阿羅漢捨無愧彼有漏不淨耶他實不應如是言乃至一六自善巧於自法之阿羅漢捨貪修道乃至修覺支乃至捨瞋乃至捨癡乃至捨無愧修道乃至修覺支彼有漏不淨耶他然自善巧於他法之阿羅漢捨棄無愧修覺支彼有漏不淨耶他實不應如是言乃至一七自善巧於自法之阿羅漢離貪離瞋乃至證所證彼有漏不淨耶他然自善巧於他法之阿羅漢離貪離瞋乃至證所證彼有漏不淨耶他實不應如是言乃至一八自善巧於他法之阿羅漢捨貪彼無漏不淨耶他然自善巧於自法之阿羅漢捨貪彼無漏不淨耶他實不應如是言乃至自善巧於他法之阿羅漢捨瞋乃至捨癡乃至捨無愧彼無漏不淨耶他然自善巧於自法之阿羅漢捨無愧彼無漏不淨耶他實不應如是言乃至一九自善巧於他法之阿羅漢捨貪修道乃至修行覺支乃至捨瞋乃至捨癡乃至捨無愧修道乃至修覺支彼無漏不淨耶他然自善巧於自法之阿羅漢捨無愧修覺支彼無漏不淨耶他實不應如是言乃至二自善巧於他法之阿羅漢離貪離瞋離癡乃至證所證彼無漏不淨耶他然自善巧於自法之阿羅漢離貪離瞋離癡乃至證所證彼無漏不淨耶他實不應如是言乃至二一自阿羅漢有漏不淨耶他然自非世尊所仰耶曰諸比丘一切比丘凡夫而具戒正念正知而眠者無漏不淨諸比丘一切之外者於欲之離貪者無漏不淨諸比丘阿羅漢漏不淨者是無處無容有如是之經耶他然自依此不應言阿羅漢有漏不淨乃至二二他不應言阿羅漢有漏不淨耶自然他非他齊來衣食牀座病緣藥資具於阿羅漢耶自然他若他齊來衣食牀座病緣藥資具於阿羅漢實汝應言阿羅漢有漏不淨二三自他齊來衣食牀座病緣藥資具於阿羅漢阿羅漢有漏不淨耶他然自他齊來於預流果一來果不還果阿羅漢果耶他實不應如是言乃至他所與論終第二章無知論今稱無知猶豫他令入之三論此處彼之阿羅漢於女男之名姓等依無起知而有無知於其名姓等依無決定而有猶豫於彼等令他人入其等之事而說明開示故有他令入之邪執者是東山住部一自阿羅漢有無知耶他然自阿羅漢有無明無明暴流無明軛無明隨眠無明纏無明結無明蓋耶他實不應如是言乃至自阿羅漢無有無明乃至無明蓋耶他然自若阿羅漢無有無明乃至無明蓋是故汝不應言阿羅漢有無知二自凡夫有無知彼有無明無明暴流無明軛無明隨眠無明纏無明結無明蓋耶他然自阿羅漢有無知彼有無明無明暴流無明軛無明隨眠無明纏無明結無明蓋耶他實不應如是言乃至三自阿羅漢有無知彼無有無明乃至無明蓋耶他然自凡夫有無知彼無有無明乃至無明蓋耶他實不應如是言乃至四自阿羅漢有無知耶他然自阿羅漢由於無知而殺生物不與取語虛誑語語離間語語粗惡語語雜穢語斷鎖鑰掠奪行竊盜待伏路邊趣於他妻破聚落破市邑耶他實不應如是言乃至自凡夫有無知凡夫由於無知而殺生物不與取破市邑耶他然自阿羅漢有無知阿羅漢由於無知而殺生物乃至破市邑耶他實不應如是言乃至五自阿羅漢有無知阿羅漢由於無知而不殺生物不與取乃至不破市邑耶他然自凡夫有無知凡夫由於無知而不殺生物不與取乃至不破市邑耶他實不應如是言乃至六自阿羅漢有無知耶他然自阿羅漢有師之無知法之無知僧伽之無知學之無知前際之無知後際之無知前後際之無知相依性緣起法之無知耶他實不應如是言乃至自阿羅漢無有師之無知法之無知僧伽之無知學之無知前際之無知後際之無知前後際之無知相依性緣起法之無知耶他然自若阿羅漢無有師之無知法之無知僧伽之無知學之無知前際之無知後際之無知前後際之無知相依性緣起法之無知者是故汝不應言阿羅漢有無知七自凡夫有無知彼有師之無知法之無知僧伽之無知乃至相依性緣起法之無知耶他然自阿羅漢有無知彼有師之無知法之無知僧伽之無知乃至相依性緣起法之無知耶他實不應如是言乃至自阿羅漢有無知彼無有師之無知法之無知僧伽之無知乃至相依性緣起法之無知耶乃至他然自凡夫有無知彼無有師之無知法之無知僧伽之無知乃至相依性緣起法之無知耶他實不應如是言乃至八自阿羅漢有無知耶他然自阿羅漢捨貪絶根如斷多羅之幹歸無有非為未來不生法耶他然自若阿羅漢捨貪絶根如斷多羅之幹歸無有為未來不生法實汝不應言阿羅漢有無知自阿羅漢捨瞋乃至捨癡乃至捨無愧絶根如斷多羅之幹歸無有非為未來不生法耶他然自若阿羅漢捨貪無愧根絶如斷多羅之幹歸無有為未來不生法實汝不應言阿羅漢有無知九自阿羅漢有無知耶他然自阿羅漢非捨貪修道乃至修菩提分耶他然自若阿羅漢捨貪乃至修行菩提分者實汝不應言阿羅漢有無知自阿羅漢有無知耶他然自阿羅漢非捨貪乃至捨無愧修道乃至非修菩提分耶他然自若阿羅漢捨無愧修菩提分實汝不應言阿羅漢有無知一自阿羅漢有無知耶他然自阿羅漢非離貪離瞋離癡乃至證所證耶他然自若阿羅漢離貪離瞋離癡乃至證所證實汝不應言阿羅漢有無知一一自阿羅漢有無知耶他善巧於自法之阿羅漢有無知善巧於他法之阿羅漢無無知自善巧於自法之阿羅漢有無知耶他然自善巧於他法之阿羅漢有無知耶他實不應如是言乃至自善巧於他法之阿羅漢無無知耶他然自善巧於自法之阿羅漢有無知耶他實不應如是言乃至一二自善巧於他法之阿羅漢捨貪彼有無知耶他實不應如是言乃至自善巧於自法之阿羅漢捨瞋捨癡乃