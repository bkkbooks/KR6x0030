body:
  text: 第五品第一章解脫論名解脫論此處觀道果觀察之四種智名為解脫智於此等中觀智以常相等解脫故或其常相等依解脫性而解脫故是為解脫智道是正斷解脫果是寂靜解脫觀察智是知解脫者為解脫智於如是四種解脫智唯果智無條件為已解脫其餘任何亦不應言已解脫或未解脫故不言名此解脫智為解脫者然而不全辦別而有如是解脫智為解脫者之邪執乃安達派一自解脫智是解脫耶他然自如何解脫智亦一切之解脫耶他實不應如是言乃至自解脫智是解脫耶他然自觀察智是解脫耶他實不應如是言乃至自解脫智是解脫耶他然自種姓有人之解脫智是解脫耶他實不應如是言乃至二自預流果作證向人之解脫智是解脫耶他然自預流之智以得逮得達證預流果之智耶他實不應如是言乃至自一來果作證向人之解脫智是解脫者耶他然自一來之智以得逮得達證一來果之智耶他實不應如是言乃至自不還果作證向人之解脫智是解脫者耶他然自不還之智以得逮得達證不還果之智耶他實不應如是言乃至自阿羅漢果作證向人之解脫智是解脫耶他然自阿羅漢之智以得逮得達證阿羅漢果之智耶他實不應如是言乃至三自具足預流果人之解脫智是解脫耶他然自預流果作證向人之解脫智是解脫耶他實不應如是言乃至自具足一來果人之解脫智是解脫耶他然自一來果作證向人之解脫智是解脫耶他然自具足不還果人之解脫智是解脫耶自不還果作證向人之解脫智是解脫耶他實不應如是言乃至自具足阿羅漢果人之解脫智是解脫耶他然自阿羅漢果作證向人之解脫智是解脫之智耶他實不應如是言乃至四自具足預流果之解脫智是解脫而達其果智耶他然自預流果作證向人之解脫智是解脫而達其果智耶他實不應如是言乃至自具足一來果人之解脫智是解脫而達其果智耶他然自一來果作證向人之解脫智是解脫而達其果智耶他實不應如是言乃至自具足不還果人之解脫智是解脫而達其果智耶他然自不還果作證向人之解脫智是解脫而達其果智耶他實不應如是言乃至自具足阿羅漢果之解脫智是解脫而達其果智耶他然自阿羅漢果作證向人之解脫智是解脫而達其果智耶他實不應如是言乃至第二章無學智論名無學論此處依長老阿難等之有學者言世尊是偉大之理趣有學知無學然而言此有學有知無學之智之邪執乃北道派一自於有學有無學之智耶他然自有學是知見見知證具足而住身證而住無學之法耶他實不應如是言乃至自有學非不知見不知不見不證不具足而住不身證而住無學之法耶他然自若有學不知見不見不知不證不具足而住不身證而住無學之法者汝不應言於有學有無學之智二自於無學有無學之智無學是知見見知證具足而住身證而住無學之法耶他然自於有學有無學之智有學是知見見知證具足而住身證而住無學之法耶他實不應如是言乃至自於有學有無學之智有學是不知不見不見不知不證不具足而住不身證而住無學之法耶他然自於無學有無學之智無學是不知不見不見不知不證不具足而住不身證而住無學之法耶他實不應如是言乃至三自於有學有無學之智耶他然自於種姓有人有預流道之智耶他實不應如是言乃至自於預流果作證向人有預流果之智耶他實不應如是而言乃至自於一來果作證乃至不還果作證乃至阿羅漢果作證向人有阿羅漢之智耶他實不應如是言乃至四他不應言於有學有無學之智耶自然他具壽阿難是有學而非知世尊是偉大知長老舍利弗長老大目犍連是偉大耶自然他若具壽阿難是有學知世尊是偉大知長老舍利弗是偉大長老大目犍連偉大是故汝應言於有學有無學之智第三章顛倒論名顛倒論此中於地遍入於地想其智為顛倒智之邪執乃安達派一自入於地遍者有顛倒智耶他然自以無常為常以苦為樂以無我為我以不淨為淨之顛倒耶他實不應如是言乃至二自入於地遍定有顛倒之智耶他然自不善耶他實不應如是言乃至自非善耶他然自若善者實汝不應言入於地遍定有顛倒之智三自以無常為常是顛倒而彼不善耶他然自入於地遍定有顛倒之智彼為不善耶他實不應如是言乃至自以苦為樂以無我為我以不淨為淨是顛倒而彼不善耶他然自入於地遍定有顛倒之智彼為不善耶他實不應如是言乃至四自入於地遍定有顛倒之智彼善耶他然自以無常為常是顛倒而彼為善耶他實不應如是言乃至自入於地遍定有顛倒之智彼善耶他然自以苦為樂乃至以無我為我乃至以不淨為淨是顛倒彼善耶他實不應如是言乃至五自入於地遍定有顛倒之智耶他然自阿羅漢入地遍定耶他然自若阿羅漢入地遍定者實汝不應言入於地遍定有顛倒之智六自入於地遍定有顛倒之智阿羅漢入地遍定耶他然自於阿羅漢有顛倒耶他實不應如是言乃至自阿羅漢有顛倒耶他然自阿羅漢有想顛倒心顛倒見顛倒耶他實不應如是言乃至自於阿羅漢無想顛倒心顛倒見顛倒耶他然自若於阿羅漢無想顛倒心顛倒見顛倒者實汝不應言於阿羅漢有顛倒七他不應言入於地遍定有顛倒之智耶自然他思地而入定者一切為地耶自實不應如是言乃至他依此實入於地遍定有顛倒之智八自入於地遍定有顛倒之智耶他然自地是存在如何以地為地而入定耶他然自若地是存存在如何以地為地而入定者汝不應言入於地遍定有顛倒之智自地是存在以地為地而入定乃有顛倒耶他然自涅槃是存在以涅槃為涅槃而入定有顛倒耶他實不應如是言乃至自依此不應言入於地遍定有顛倒之智第四章決定論名決定論世尊認為入正性決定之人可能現觀法故於不定之異生補特伽羅有入決定智之邪執乃北道派一自不定者有入決定智耶他然自決定者有入不定智耶他實不應如是言乃至自決定者無入不定智耶他然自不定者無入決定智耶他實不應如是言乃至二自不定者有入決定智耶他然自決定者有入決定智耶他實不應如是言乃至自決定者無入決定智耶他然自不定者無入決定智耶他實不應如是言乃至三自不定者有入決定智耶他然自不定者有入不定智耶他實不應如是言乃至自不定者無入不定智耶他然自不定者無入決定智耶他實不應如是言乃至四自不定者有入決定智耶他然自不定者有入決定道耶他實不應如是言乃至自不定者有入決定智耶他然自不定者有入決定念住乃至正勤神足根力覺支耶他實不應如是言乃至五自不定者無入決定道耶他然自若不定者無入決定道者汝不應言不定者有入決定智自不定者無入決定念住乃至覺支耶他然自若不定者無入決定覺支者汝不應言不定者有入決定智六自不定者有入決定智耶他然自於種姓有人有預流道智耶他實不應如是言乃至自於預流果作證向人有預流果智耶他實不應如是言乃至自一來果作證向人乃至於阿羅漢果作證向人有阿羅漢果智耶他實不應如是言乃至七他不應言不定者有入決定智耶世尊非認為入正性決定者可能現觀法耶自然他若世尊認為入正性決定者可能現觀法者汝應言不定者有入決定智第五章無礙解論名無礙解論執聖者之有智者一切出世間而一切智是無礙解之邪執乃安達派一自一切智是無礙解耶他然自世俗智是無礙解耶他實不應如是言乃至自世俗智是無礙解耶他然自如何者知一切世俗是到達無礙解耶他實不應如是言乃至自一切之智是無礙解耶他然自他心智是無礙解耶他實不應如是言乃至自他心智是無礙解耶他然自如何者知一切他心是到達無礙解耶他實不應如是言二自一切智是無礙解耶他然自一切慧是無礙解耶他實不應如是言乃至自一切慧是無礙解耶他然自入地遍定有慧其慧是無礙解耶他實不應如是言乃至自入地遍水遍火遍風遍青遍黃遍赤遍白遍空無邊處識無邊處無所有處非想非非想處定者與布施與衣與施食與床座與病緣藥資具是有慧其慧是無礙解耶他實不應如是言乃至三他不應言一切智是無礙解耶自然他有出世間慧其智非無礙解耶自實不應如是言乃至他依此一切智是無礙解第六章世俗智論名世俗智論此處有世俗諦真諦之二諦然而無此區別而依諦語之共通言世俗智亦唯諦所緣乃安達派一他不應言世俗智是諦所緣而非他所緣耶自然他入於地遍定有智地遍非於世俗諦耶自然他若入地遍定有智於地遍是世俗諦者是故汝應言世俗智是諦所緣而非他所緣二他不應言世俗智是諦所緣而非他所緣耶自然他行水遍乃至火遍乃至施病緣藥資具是有智病緣藥資具非於世俗諦耶自然他若施病緣藥資具有智病緣藥資具是世俗諦者是故汝應言世俗智是諦所緣而非他所緣三自世俗智是諦所緣而非他所緣耶他然自依其智而遍智苦捨集證滅修道耶他實不應如是言乃至第七章心所緣論名心所緣論此處執言心差別智唯語而其智唯心所緣之邪執乃安達派一自心差別智是心所緣而非他所緣耶他然自或者有貪心而不知有貪心耶他然自若或者有貪心而知有貪心者汝不應言心差別智是心所緣而非他所緣自或者以離貪心知離貪心乃至有瞋心乃至離瞋心乃至有癡心乃至離癡心集心散心大極心非大極心有上心無上心寂靜心非寂靜心解脫心乃至以未解脫心知未解脫心耶他然自若或者以未解脫心知未解脫心者汝不應言心差別智是心所緣而非他所緣二自觸所緣智不應言心差別智耶他然自若觸所緣智應言心差別智者汝不應言心差別智是心所緣而非他所緣自受所緣智想所緣智思所緣智心所緣智信所緣智進所緣智念所緣智定所緣智慧所緣智乃至貪所緣智乃至瞋所緣智乃至無愧所緣智是應言心差別智耶他然自若無愧所緣智是應言心差別智者實汝不應言心差別智是心所緣而非他所緣乃至三自觸所緣智是不應言心差別智耶他然自是觸差別智耶他實不應如是言乃至自受所緣智乃至想所緣智乃至無愧所緣智是不應言心差別智耶他然自是無愧差別智耶他實不應如是言乃至四他不應言心差別智是心所緣而非他所緣耶自然他於心差別之非智耶自然他若於心差別是智是故汝應言心差別智是心所緣而非他所緣第八章未來智論名未來智論此處名未來有無間非為無間此等之中於無間全然無智如無間向一方之路認知屬於一事亦於未來無智然而於此處許於有一切未來之智者乃安達派一自於未來有智耶他然自未來依根本而知耶依因而知耶依緒而知耶依生而知耶依出生而知耶依興起而知耶依招來而知耶依所緣而知耶依緣而知耶依集因而知耶他實不應如是言乃至二自於未來有智耶他然自知未來之因緣耶知所緣緣耶知增上緣耶知無間緣耶知等無間緣耶他實不應如是言乃至三自於未來有智耶他然自種姓有人於預流道有智耶他實不應如是言乃至自預流果作證向人於預流果有智耶他實不應如是言乃至自一來果作證向人乃至不還果作證向人乃至阿羅漢果作證向人於阿羅漢果有智耶他實不應如是言乃至四他不應言於未來有智耶自然他非世尊所仰耶曰阿羅陀於巴連弗應起三種障難乃依火水破和合有如是之經耶自然他是故於未來有智第九章現在智論名現在智論此處彼依止於文見一切行是無常時見其智亦無常而無差別於一切現在有智之邪執乃安達派一自於現在有智耶他然自依其智而知其智耶他實不應如是言乃至自依其智而知其智耶他然自依其智而知其智是智耶他實不應如是言乃至自依其智而知其智是智耶他然自其智是其智之所緣耶他實不應如是言乃至自其智是其智之所緣耶他然自依其觸而觸其觸依其受而受納其受依其想而取想其想依其思而思其思依其心而思其心依其尋而尋其尋依其伺而伺其伺依其喜而喜其喜依其念而念其念依其慧而知其慧依其刀而切其刀依其手斧而斷其手斧依其釿而斷其釿以其小刀而斷其小刀以其針而縫其針以其指尖而附其指尖以其鼻端而附其鼻端以其頭而附其頭依其排泄物而洗其排泄物以其小便而洗其小便依其膿而洗其膿依其血而洗其血耶他實不應如是言乃至二他不應言於現在有智耶自然他見一切行是無常時非見其智亦無常耶自然他若見一切行是無常時見其智亦無常者是故汝應言於現在有智第十章果智論名果智論此處言諸佛依諸有情之得聖果而說法聲聞亦然依此之共通而如諸佛聲聞亦依彼有情於得果而有智之彼等邪執乃安達派一自聲聞於果有智耶他然自聲聞知果之已作耶他實不應如是言乃至自聲聞有於果之智耶他然自聲聞有果上下知智根上下知智補特伽羅上下知智耶他實不應如是言乃至二自聲聞於果有智耶他然自聲聞有蘊施設處施設界施設諦施設根施設補特伽羅施設耶他實不應如是言乃至三自聲聞於果有智耶他然自聲聞是勝者大師等正覺者一切知一切見法主法依耶他實不應如是言乃至四自聲聞於果有智耶他然自聲聞是未生道之能生者未正生道之能正生者未知道之告知者道知者道智者道熟智者耶他實不應如是言乃至五他不應言聲聞於果有智耶自然他聲聞是無有智耶自實不應如是言乃至他是故聲聞於果有智彼之攝頌曰解脫智是解脫於有學有無學智顛倒智與不定入決定智一切智是無礙解與世俗智他心智與未來智現在智與聲聞之智第五品終
