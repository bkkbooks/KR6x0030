body:
  text: 論事歸命彼世尊應供正覺者大品第一章補特伽羅論補特伽羅是依諦義勝義而得耶是論師之自問對此有補特伽羅是補特伽羅論者之邪執如何是補特伽羅論者於佛教內之犢子部正量部更是教外多數之外道此補特伽羅者是我有情命者佛教內之補特伽羅論者仰望世尊為己利益之修行有補特伽羅而執補特伽羅是依諦義勝義而得第一節墮負第一順論五一自補特伽羅是依諦義勝義而得耶他然也自諦義勝義之補特伽羅是故依諦義勝義而得耶他實不應如是言自汝應認墮負若補特伽羅是依諦義勝義而得者依此汝實應言諦義勝義之補特伽羅是故依諦義勝義而得此若如汝所言汝雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義而得乃邪也更若不言諦義勝義之補特伽羅是故依諦義勝義而得亦實汝不可言補特伽羅依諦義勝義而得此若如汝所言者汝雖言補特伽羅依諦義勝義而得共實是不應言諦義勝義之補特伽羅是故依諦義勝義而得乃邪也返論四二他補特伽羅是依諦義勝義而不得耶自然也他諦義勝義之補特伽羅是故依諦義勝義而不得耶自實不應如是言他汝應承認返論若補特伽羅是依諦義勝義而不得者依此實汝應言諦義勝義之補特伽羅是故依諦義勝義不而得此若如汝所言雖言補特伽羅是依諦義勝義不而得但實汝不可言諦義勝義之補特伽羅是故依諦義勝義而不得乃邪也更若不言諦義勝義之補特伽羅是故依諦義勝義而不得亦實汝不應言補特伽羅是依諦義勝義而不得此若如汝所言雖言補特伽羅是依諦義勝義而不得但實不應言諦義勝義之補特伽羅是故依諦義勝義而不得乃邪也墮負四三他若汝雖更言補特伽羅是依諦義勝義而不得但有否考慮不應言諦義勝義之補特伽羅是故依諦義勝義而不得是故汝於此其如是立論如是肯定應如左之墮負我墮負汝汝是正當被墮負若補特伽羅是依諦義勝義而不得由此汝實應言諦義勝義之補特伽羅是故依諦義勝義而不得此若如汝所言雖言補特伽羅是依諦義勝義而不得但實應言諦義勝義之補特伽羅是故依諦義勝義而不得乃邪也更若不可言諦義勝義之補特伽羅是故依諦義勝義而不得亦實汝不應言補特伽羅是依諦義勝義而不得此若如汝所言應言補特伽羅是依諦義勝義而不得但實不應言諦義勝義之補特伽羅是故依諦義勝義而不得此是汝之邪也合四四他若此等墮負四是不當之墮負同以此事可見於彼處順論五於順論五雖言補特伽羅是依諦義勝義而得但實不應言諦義勝義之補特伽羅是故依諦義勝義而得我對汝於彼處依其如是立論由如是肯定之如是非墮負然我以汝是墮負我有使不當之墮負也即汝墮負而曰若補特伽羅是依諦義勝義而得依此實汝言諦義勝義之補特伽羅是故依諦義勝義而得此若如汝所言雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義而得乃邪也更若不言諦義勝義之補特伽羅是故依諦義勝義而得實亦汝不應言補特伽羅依諦義勝義而得此若如汝所言雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義而得此是汝之邪也結四五他如是我非是墮負以我使汝墮負即若補特伽羅是依諦義勝義而得依此汝實應言諦義勝義之補特伽羅是故依諦義勝義而得此若如汝所言雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義而得乃邪也更若不言諦義勝義之補特伽羅是故依諦義勝義而得亦實汝不可言補特伽羅是依諦義勝義而得此若如汝所言雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義而得此是汝之邪也依此而使墮負是等一切是於不當之墮負我返論是正確是美事之推理第二節墮負第二逆論五六他補特伽羅是依諦義勝義而不得耶自然他諦義勝義之補特伽羅是故依諦義勝義而不得耶自實不應如是言他汝應認墮負若補特伽羅是依諦義勝義而不得依此實汝應言諦義勝義之補特伽羅是故依諦義勝義而不得此若如汝所言雖言補特伽羅是依諦義勝義而不得但實不可言諦義勝義之補特伽羅是故依諦義勝義而不得乃邪也更若不言諦義勝義之補特伽羅是故依諦義勝義而不得實亦汝不可言補特伽羅是依諦義勝義而不得此若如汝所言雖言補特伽羅是依諦義勝義而不得但實不可言諦義勝義之補特伽羅是故依諦義勝義而不得乃邪也返論四七自補特伽羅是依諦義勝義而得耶他然自諦義勝義之補特伽羅是故依諦義勝義而得耶他實不應如是言自汝應承認返論若補特伽羅是依諦義勝義而得依此實汝應言諦義勝義之補特伽羅是故依諦義勝義而得此若如汝所言雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義而得乃邪也更若不言諦義勝義之補特伽羅是故依諦義勝義而得亦實汝不得言補特伽羅是依諦義勝義而得此若如汝所言雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義而得乃邪也墮負四八自汝若雖更言補特伽羅是依諦義勝義而得有否考慮不應言諦義勝義之補特伽羅是故依諦義勝義而得是故汝於此依其如是立論如是肯定應如左之墮負以我墮負汝汝是正當被墮負若補特伽羅是依諦義勝義而得依此實汝應言諦義勝義之補特伽羅是故依諦義勝義而得此若如汝所言雖言補特伽羅是依諦義勝義而得但實不可言諦義勝義之補特伽羅是故依諦義勝義