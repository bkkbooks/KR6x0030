有非有是有是等乃各各一義平等同類等族之物耶他實不應如是言乃至二自未來是有耶他如是而有如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在非存在是存在實有是非實有非實有是實有有是非有非有是有是等乃各各一義平等同類等族之物耶他實不應如是言乃至三自現在是有耶他如是而有如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在非存在是存在實有是非實有非實有是實有有是非有非有是有是等各各一義平等同類等族之物耶他實不應如是言乃至四自過去乃如是而有如是而非有耶他然自如何而有如何而非有耶他過去為過去如是而有過去為未來如是而非有過去為現在如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在非存在是存在實有是非實有非實有是實有有是非有非有是有是等各各一義平等同類等族之物耶他實不應如是言乃至五自未來乃如是而有如是而非有耶他然自如何而有如何而非有耶他未來為未來如是而有未來為過去如是而非有未來為現在如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在非存在是存在實有是非實有非實有是實有有是非有非有是有是等各各一義平等同類等族之物耶他實不應如是言乃至六自現在乃如是而有如是而非有耶他然自如何而有如何而非有耶他現在為現在如是而有現在為過去如是而非有現在為未來如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在非存在是存在實有是非實有非實有是實有有是非有非有是有是等各各一義平等同類等族之物耶他實不應如是言乃至七他不應言過去乃如是而有如是而非有未來乃如是而有如是而非有現在乃如是而有如是而非有耶自然他過去為未來如是而有耶過去為現在如是而有耶未來為過去如是而有耶未來為現在如是而有耶現在為過去如是而有耶現在為未來如是而有耶自實不應如是言乃至他依此實過去乃如是而有如是而非有未來如是而有如是而非有現在如是而有如是而非有八自色是有耶他如是而有如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者如是而非有耶他然自存在是非存在非存在是存在實有是非實有非實有是實有有是非有非有是有是等各各一義平等同類等族之物耶他實不應如是言乃至九自受想行識是有耶他如是而有如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在非在存是存在實有是非實有非實有是實有有是非有非有是有是等各各一義平等同類等族之物耶他實不應如是言乃至一自色如是而有如是而非有耶他然自如何而有如何而非有耶他色為色如是而有色為受如是而非有乃至色為想如是而非有乃至色為行如是而非有色為識如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在非存在是存在實有是非實有非實有是實有有是非有非有是有是等各各一義平等同類等族之物耶他實不應如是言乃至一一自受想行識乃如是而有如是而非有耶他然自如何而有如何而非有耶他識為識如是而有識為色如是而非有乃至識為受如是而非有識為想如是而非有乃至識為行如是而非有自如是而有者乃如是而非有耶他實不應如是言乃至自如是而有者乃如是而非有耶他然自存在是非存在乃至等族之物耶他實不應如是言乃至一二他不應言色乃如是而有如是而非有受乃如是而有如是而非有想乃如是而有如是而非有行乃如是而有如是而非有識乃如是而有如是而非有耶自然他色為受如是而有乃至色為想如是而有乃至色為行如是而有乃至色為識如是而有乃至受想行識為色如是而有乃至識為受如是而有乃至識為想如是而有乃至識為行如是而有耶自實不應如是言乃至他依此實色乃如是而有如是而非有受乃如是而有如是而非有想乃如是而有如是而非有行乃如是而有如是而非有識乃如是而有如是而非有如是有論終彼之攝頌曰得退梵行住各分分徧知欲貪斷一切有論處於過去未來之貪一切法念處如是有如是非有大品終
