body:
  text: 第四品第一章家住阿羅漢論今名家住阿羅漢論此處見彼貴族子耶舍等住於家住之姿相得阿羅漢而有家住阿羅漢之邪執乃北道派一自有家住阿羅漢耶他然自阿羅漢有家住之結耶他實不應如是言乃至自阿羅漢無家住之結耶他然自若阿羅漢無家住之結汝不應言有家住阿羅漢二自有家住阿羅漢耶他然自阿羅漢家住之結斷被根絕如切多羅樹之幹歸無有未來不生法耶他然自若阿羅漢家住之結斷被根絕如切多羅樹之幹歸無有未來不生法者汝不應言有家住阿羅漢三自有家住阿羅漢耶他然自某家住者不斷家住之結而於現法有苦之終耶他然自若某家住者不斷家住之結而於現法無苦之終者汝不應言有家住阿羅漢四自有家住阿羅漢耶他然自婆蹉種出家者非對世尊如是言耶曰瞿曇某家住者不斷家住之結身破壞是否苦之終婆蹉某家住者不斷家住之結身破壞不為苦之終有如是之經耶他然自是故不應言有家住阿羅漢五自有家住阿羅漢耶他然自阿羅漢者耽於淫法行淫法求兒圍繞於牀反求迦尸國之栴檀持纏衣軟膏受金銀購山羊買雄鷄求象牛馬求鷓鴣鶉孔雀雉著纏衣上著白衣著長裾乃生涯家住耶他實不應如是言乃至六他不應言有家住阿羅漢耶自然他貴族子耶舍家主鬱低伽梵童闍睹以家住之姿相不得阿羅漢耶自然他若貴族子耶舍家主鬱低迦梵童闍睹以家住之姿相得阿羅漢者是故汝應言有家住阿羅漢第二章生阿羅漢論此處名生論此處彼執化生者於其處般涅槃等之語不如理生淨居者是與生同時為阿羅漢之邪執取生般涅槃之語理解為生而般涅槃邪執與生同時為阿羅漢乃北道派一自與生同時是阿羅漢耶他然自於與生同時是預流耶他實不應如是言乃至自於與生同時阿羅漢耶他然他於與生同時是一來耶他實不應如是言乃至自於與生同時是阿羅漢耶他然自於與生同時是不還耶他實不應如是言乃至二自於與生同時不是預流耶他然自若於與生同時不是預流汝不應言於與生同時是阿羅漢自於與生同時不是不來耶他然自若與生同時不是一來汝不應言於與生同時是阿羅漢自於與生同時不是不還耶他然自若於與生同時不是不還者汝不應言於與生同時是阿羅漢三自於與生同時是阿羅漢耶他然自長老舍利弗與生同時是阿羅漢耶他實不應如是言乃至自長老大目犍連乃至長老大迦葉乃至長老大迦旃延乃至長老大俱絺羅乃至長老大半託迦與生同時是阿羅漢耶他實不應如是言乃至四自長老舍利弗與生同時不是阿羅漢耶他然自若長老舍利弗與生同時不是阿羅漢者汝不應言於與生同時是阿羅漢自長老大目犍連乃至長老大迦葉乃至長老大迦旃延乃至長老大俱絺羅乃至長老大半託迦與生同時不是阿羅漢耶他然自若長老大半託迦與生同時不是阿羅漢者汝不應言於與生同時是阿羅漢五自於與生同時是阿羅漢耶他然自依欲生之心依世間依有漏乃至依雜染而證阿羅漢耶他實不應如是言乃至自於與生同時是阿羅漢耶他然自欲生之心是出離趣盡趣菩提損減無漏乃至無雜染耶他實不應如是言乃至自欲生之心是無出離不趣盡不趣菩提不損減有漏乃至非是雜染耶他然自若欲生之心是無出離不趣盡不趣菩提不損減有漏乃至是雜染者汝不應言於與生同時是阿羅漢六自於與生同時是阿羅漢耶他然自依欲生之心而斷貪斷瞋斷癡乃至斷無愧耶他實不應如是言乃至自於與生同時是阿羅漢耶他然自欲生之時是道乃至念處正勤神足根力乃至覺支耶他實不應如是言乃至自於與生同時是阿羅漢耶他然自依欲生之心而徧知苦捨集證滅修道耶他實不應如是言乃至自於與生同時是阿羅漢耶他然自死心是道心生心是果心耶他實不應如是言乃至第三章無漏論此處名無漏論有無漏阿羅漢之法一切無漏之邪執乃北道派一自阿羅漢之一切法是無漏耶他然自是道果涅槃預流道預流果一來道一來果不還道不還果阿羅漢道阿羅漢果念處正勤神足根力覺支耶他實不應如是言乃至二自阿羅漢之一切法是無漏耶他然自阿羅漢之眼是無漏耶他實不應如是言乃至自阿羅漢之眼是無漏耶他然自是道果涅槃乃至覺支耶他實不應如是言乃至自阿羅漢之耳乃至阿羅漢之鼻乃至阿羅漢之舌乃至阿羅漢之身是無漏耶他實不應如是言乃至自阿羅漢之身是無漏耶他然自是道果乃至覺支耶他實不應如是言乃至三自阿羅漢之身是無漏耶他然自阿羅漢之身是無伸縮而得無切斷而得共鴉鳶鷹耶他然自無漏法是無伸縮而得無切斷而得共鴉鳶鷹耶他實不應如是言乃至四自於阿羅漢之身毒有效耶武器有效耶火有效耶他然自於無漏法毒有效耶武器有效耶火有效耶他實不應如是言乃至自阿羅漢之身被縛於束縛縛於繩縛縛於鎖縛縛於聚落之縛縛於町邑之縛縛於都市之縛縛於國郡之縛縛於第五首縛而得耶他然自無漏法被縛於束縛縛於繩縛乃至縛於第五首縛耶他實不應如是言乃至五自若阿羅漢施衣於凡夫乃無漏而有漏耶他實不應如是言乃至自是無漏而有漏耶他然自是無漏者即有漏者耶他實不應如是言乃至自是無漏者即有漏者耶他然自道是無漏而有漏耶他實不應如是言乃至自果念處正勤神足根力覺支乃無漏而有漏耶他實不應如是而言乃至六自若阿羅漢施食施牀座施病緣藥資具於凡夫是無漏而有漏耶他實不應如是言乃至自為無漏而有漏耶他然自無漏即有漏者耶他實不應如是言乃至自無漏即有漏者耶他然自道是無漏而有漏耶他實不應如是言乃至自果念處正勤神足根力覺支是無漏而有漏耶他實不應如是言乃至七自若凡夫施衣於阿羅漢乃有漏而無漏耶他實不應如是言乃至自是有漏而無漏耶他然自是有漏即無漏者耶他實不應如是言乃至自是有漏即無漏者耶他然自貪是有漏而無漏耶他實不應如是言乃至自瞋乃至癡乃至無愧是有漏而無漏耶他實不應如是言乃至八自若凡夫施食牀座病緣藥資具於阿羅漢是有漏而無漏耶他實不應如是言乃至自是有漏而無漏耶他然自有漏即無漏者耶他實不應如是言乃至自有漏即無漏者耶他然自貪是有漏而無漏耶他實不應如是言乃至自瞋乃至癡乃至無愧是有漏而無漏耶他實不應如是言乃至九自不應言阿羅漢之一切法是無漏耶自然他阿羅漢非是無漏耶自然他若阿羅漢是無漏汝應言阿羅漢之一切法是無漏第四章具足論此處名具足論此處有二種之具足於現在剎那具足之具足與由得色界等地地之獲得具足此後者只得勝進而不退而得然而除此二者之外有名依得法之一種具足之邪執乃北道派一自阿羅漢具足四果耶自阿羅漢具足四觸四受四想四思四心四信四進四念四定四慧耶他實不應如是言乃至二自不還具足三果耶他然自不還具足三觸乃至三慧耶他實不應如是言乃至自一來具足二果耶他然自一來具足二觸乃至二慧耶他實不應如是言乃至三自阿羅漢具足預流果耶他然自阿羅漢是預流極七返有家家一間耶他實不應如是言乃至自阿羅漢具足一來果耶他然自阿羅漢是一來耶他實不應如是言乃至自阿羅漢具足不還果耶他然自阿羅漢是不還中般涅槃生般涅槃無行般涅槃有行般涅槃上流往色究竟天耶他實不應如是言乃至四自不還具足預流果耶他然自不還是預流極七返有家家一間耶他實不應如是言乃至自不還具足一來果耶他然自不還是一來耶他實不應如是言乃至自一來具足預流果耶他然自一來是預流極七返有家家一間耶他實不應如是言乃至五自除了具足預流果應言預流耶他然自阿羅漢具足預流果耶他然自阿羅漢如實是預流耶他實不應如是言乃至自除了具足一來果應言一來耶他然自阿羅漢具足一來果耶他然自阿羅漢即一來耶他實不應如是言乃至自除了具足不還果應言不還耶他然自阿羅漢具足不還果耶他然自阿羅漢即不還耶他實不應如是言乃至六自除了具足預流果應言預流耶他然自不還具足預流果耶他然自不還即預流耶他實不應如是言乃至自由具足一來果應言一來耶他然自不還具足一來果耶他然自由具足預流果應言預流耶他一來具足預流果耶他然自一來即預流耶他實不應如是言乃至七自阿羅漢具足預流果耶他然自阿羅漢非超過預流果耶他然自若阿羅漢超過預流果者汝不應言阿羅漢具足預流果八自阿羅漢超過預流果其具足耶他然自阿羅漢超過預流道超過有身見疑戒禁取到惡趣之貪到惡趣之瞋到惡趣之癡其具足耶他實不應如是言乃至九自阿羅漢具足一來果耶他然自阿羅漢非超過一來果耶他然自若阿羅漢超過一來果者汝不應言阿羅漢具足一來果一自阿羅漢超過一來果其具足耶他然自阿羅漢超過一來道超過麤欲貪麤瞋恚其具足耶他實不應如是言乃至一一自阿羅漢具足不還果耶他然自阿羅漢非超過不還果耶他然自若阿羅漢超過不還果者汝不應言阿羅漢具足不還果一二自阿羅漢超過不還果其具足耶他然自阿羅漢超過不還道超過微俱行欲貪微俱行瞋恚其具足耶他實不應如是言乃至一三自不還具足預流果耶他然自不還非超過預流果耶他然自若不還超過預流果者汝不應言不還具足預流果一四自不還超過預流果其具足耶他然自不還超過預流道超過有身見疑戒禁取到惡趣之貪到惡趣之瞋到惡趣之癡其具足耶他實不應如是言乃至一五自不還具足一來果耶他然自不還非超過一來果耶他然自若不還超過一來果者汝不應言不還具足一來果一六自不還超過一來果其具足耶他然自不還超過一來道超過麤欲貪麤瞋恚其具足耶他實不應如是言乃至一七自一來具足預流果耶他然自一來非超過預流果耶他然自若一來超過預流果者汝不應言一來具足預流果一八自一來超過預流果其具足耶他然自一來超過預流道超過有身見疑戒禁取到惡趣之貪到惡趣之瞋到惡趣之癡其具足耶他實不應如是言乃至一九他不應言阿羅漢具足四果耶自然他阿羅漢逮得四果依此等非不退耶自然他若阿羅漢逮得四果依此等不退者是故汝應言阿羅漢具足四果二他不應言不還具足三果耶自然他不還逮得三果依此等非不退耶自然他若不還逮得三果依此等不退者是故汝應言不還具足三果二一他不應言一來具足二果耶自然他一來逮得二果依此等非不退耶自然他若一來逮得二果依此等不退者是故汝應言一來具足二果二二自阿羅漢逮得四果依此等不退阿羅漢具足四果耶他然自阿羅漢逮得四道依此等不退阿羅漢具足四道耶他實不應如是言乃至二三自不還逮得三果依此等不退不還具足三果耶他然自不還逮得三道依此等不退不還具足三道耶他實不應如是言乃至二四自一來逮得二果依此等不退一來具足二果耶他然自一來逮得二道依此等不退一來具足二道耶他實不應如是言乃至第五章捨具足論一自阿羅漢具足六捨耶他然自阿羅漢具足六觸六受乃至六慧耶他實不應如是言乃至二自阿羅漢具足六捨耶他然自阿羅漢依眼而見色依耳而聞聲依鼻而嗅香依舌而覺味依身而感觸依意而知法耶依意而知法依眼而見色依耳而聞聲依鼻而嗅香依舌而覺味