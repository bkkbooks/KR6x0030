body:
  text: 第三品第一章力論今名力論此處執阿菟樓陀相應經中言執此斷也友修四念處多所作知處是處非處是非處等十經是不如理而如來力共聲聞之邪執乃現在之安達派一自如來力是共聲聞耶他然自如來力是聲聞力聲聞力是如來力耶他實不如是言乃至自如來力是共聲聞耶他然自如來力即聲聞力聲聞力即如來力耶他實不如是言乃至自如來力是共聲聞耶他然自如如來力有聲聞力如聲聞力有如來力耶他實不如是言乃至自如來力是共聲聞耶他然自如如來之前生事前生行法話法説有聲聞之前生事前生行法話法説耶他實不如是言乃至二自如來力是共聲聞耶他然自如來是勝者大師正覺者一切知一切見法主法依耶他然自聲聞是勝者大師正覺者一切知一切見法主法依耶他實不如是言乃至自如來力是共聲聞耶他然自如來是未生道之能生者未正生道之能正生者未知道之告知者道知者道智者道熟知者耶他然自聲聞是未生道之能生者未正生道之能正生者未知道之告知者道知者道智者道熟知者耶他實不如是言乃至三自根上下如實智如來力是共聲聞耶他然自聲聞是一切知一切見耶他實不如是言乃至四他聲聞是知處非處耶自然他若聲聞是知處非處者是故汝應言處非處如實智如來力是共聲聞五他聲聞是由處因而知過去未來現在業所得之異熟耶自然他若聲聞是由處因而知過去未來現在業所得之異熟者是故汝應言過去未來現在業所得異熟由處因如實智如來力是共聲聞六他聲聞是知遍趣行耶自然他若聲聞是知遍趣行者是故汝應言遍趣行如實智如來力是共聲聞七他聲聞是知無數界種種界世間耶自然他若聲聞是知無數界種種界世間者是故應言無數界種種界世間如實智如來力共聲聞八他聲聞知有情之種種勝解耶自然他若聲聞是知有情之種種勝解是故汝應言有情種種勝解如實智如來力是共聲聞九他聲聞是知靜慮解脫等持等至之染淨出離耶自然他若聲聞是知慮解脫等持等至之染淨出離者是故汝應言靜慮解脫等持等至之染淨出離如實智如來力是共聲聞一他聲聞是知宿住隨念耶自然他聲聞是知宿住隨念耶自然他若聲聞是知宿住隨念者是故汝應言宿住隨念如實智如來力是共聲聞一一他聲聞是知有情之死生耶自然他若聲聞是知有情之死生者是故汝應言有情死生如實智如來力是共聲聞一二他如來非漏已盡聲聞亦漏已盡耶自然他依如來與聲聞之漏盡而漏已盡依解脫而已解脫何等有彼異所作耶自實不應如是言乃至他若依如來與聲聞之漏盡漏盡而漏已盡依解脫而已解脫然無何等之異所作者是故汝應言漏盡如實智如來力是共聲聞一三他漏盡如實智如來力是共聲聞耶自然他處非處如實智如來力是共聲聞耶自實不應如是言乃至他然漏盡如實智如來力是共聲聞耶自然他有情生如實智如來力是共聲聞耶自實不應如是言乃至一四他處非處如實智如來力是不共聲聞耶自然他漏盡如實智如來力是不共聲聞耶自然他然漏盡如實智如來力是不共聲聞耶自實不應如是言乃至一五他根上下如實智如來力是不共聲聞耶自然他處非處如實智如來力是不共聲聞耶自實不應如是言乃至他根上下如實智如來力是不共聲聞耶自然他漏盡如實智如來力是不共聲聞耶自實不應如是言乃至一六他處非處如實智如來是共聲聞耶自然他根上下如實智如來力是共聲聞耶自實不應如是言乃至他漏盡如實智如來力是共聲聞耶自然他根上下如實智如來力是共聲聞耶自實不應如是言乃至第二章聖論今名言聖論此處有不唯漏盡智為聖而前九力亦是聖之邪執乃現在之安達派一自處非處如實智如來力是聖耶他然自是道果涅槃預流道預流果一來道一來果不還道不還果阿羅漢道阿羅漢果念處正勤神足根力覺支耶他實不應如是言乃至二自處非處如實智如來力是聖耶他然自是空性所緣耶他實不應如是言乃至自是空性所緣耶他然自是作意處非處作意空性耶他實不應是言乃至自作意處非處作意空性耶他然自為二觸二心俱起耶他實不應如是言乃至三自處非處如實智如來力是聖耶他然自是無相所緣無願所緣耶他實不應如是言乃至自是無願所緣耶他然自是作意處非處作意無願耶他實不應如是言乃至自是作意處非處作意無願耶他然自是二觸二心俱起耶他實不應如是言乃至四自念處是聖而空性所緣耶他然自處非處如實智如來力是聖而空性所緣耶他實不應如是言乃至自念處是聖而無相所緣乃至無願所緣耶他然自處非處如實智如來力是聖而無願所緣耶他實不應如是言乃至五自正勤神足根力覺支是聖而空性所緣耶他然自處非處如實智如來力是聖而空性所緣耶他實不應如是言乃至自覺支是聖而無相所緣乃至無願所緣耶他然自處非處如實智如來力是聖而無願所緣耶他實不應如是言乃至六自處非處如實智如來力是聖而不應言空性所緣耶他然自念處是聖而不應言空性所緣耶他實不應如是言乃至自處非處如實智如來力是聖而不應言無相所緣乃至無願所緣耶他然自念處是聖而不應言無願所緣耶他實不應如是言乃至自處非處如實智如來力是聖而不應言空性所緣乃至無相所緣乃至無願所緣耶他然自正勤乃至覺支是聖而不應言無願所緣耶他實不應如是言乃至七自有情死生如實智如來力是聖耶他然自是道果涅槃預流道預流果一來道一來果不還道不還果阿羅漢道阿羅漢果念處正勤神足根力覺支耶他實不應如是言乃至八自有情死生如實智如來力