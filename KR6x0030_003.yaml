實不應如是言乃至二自如業所往智是天眼耶他然自大德是等作意有情具足身惡行之作意具足語惡行之作意具足意惡行之作意誹謗賢聖之作意邪見者之作意彼身壞命終而墮於惡趣生於地獄之作意大德是等作意有情具足身善行之作意具足語善行之作意具足意善行之作意不誹謗賢聖正見之作意正見業所受之作意彼身壞命終而生於天上善趣之作意依天眼而見色耶他實不應如是言乃至自如業所往智是天眼耶他然自大德是等有情之作意乃至彼身壞命終而生於天上善趣之作意依天眼而見色耶他然自二觸二心俱起耶他實不應如是言乃至三自如業所往智天眼耶他然自不成天眼不得達天眼不作證者有知如業所往耶他然自若不成天眼不得達天眼不作證者有知如業所往者實汝不應言如業所往智是天眼四自如業所往智是天眼耶他然自具壽舍利弗知如業所往耶他然自若具壽舍利弗知如業所往者實汝不應言如業所往智是天眼五自具壽舍利弗知如業所往耶他然自具壽舍利弗有天眼耶他實不應如是言乃至自具壽舍利弗有天眼耶他然自具壽舍利弗非如是説耶曰宿命通天眼通心差別通耳界清淨通願死生通此等非我有如是之經耶他然自依此不應言如業所往智是天眼第十章律儀論今名律儀論此處有入三十三天於此以上之天五惡不現行故有律儀之邪執一自天有律儀耶他然自天有非律儀耶他實不應如是言乃至自天無非律儀耶他然自天無律儀耶他實不應如是言乃至二自由非律儀之律儀為戒天非有律儀耶他然自天有非律儀由其非律儀之律儀為戒耶他實不應如是言乃至自汝應承認墮負若由非律儀之律儀為戒而天有律儀者汝應言天有非律儀由其非律儀之律儀為戒於此汝應言由非律儀之律儀為戒而天有律儀不應言天有非律儀由其非律儀之律儀為戒之説是邪又若不言天有非律儀由其非律儀之律儀為戒者汝不應言由非律儀之律儀為戒而天有律儀於此汝言由非律儀之律儀為戒而天有律儀不應言天有非律儀由其非律儀之律儀為戒之説是邪三自人有律儀於此有非律儀耶他然自天有律儀於此有非律儀耶他實不應如是言乃至自天有律儀於此無非律儀耶他然自人有律儀於此無非律儀耶他實不應如是言乃至四自天有離殺生之事耶他然自天有殺生耶他實不應如是言乃至自天有離穀酒木酒酒精分之放逸處耶他然自天有穀酒木酒酒精分之放逸處耶他實不應如是言乃至五自天無殺生耶他然自天無離殺生耶他實不應如是言乃至自天無穀酒木酒酒精分之放逸處耶他然自天無離穀酒木酒酒精分之放逸處耶他實不應如是言乃至六自人有離殺生於此有殺生耶自然自天有離殺生於此有殺生耶他實不應如是言乃至自人有離穀酒木酒酒精分之放逸處於此有穀酒木酒酒精分之放逸處耶他然自天有離穀酒木酒酒精分之放逸處於此有穀酒木酒酒精處之放逸處耶他實不應如是言乃至七自天有離殺生於此無殺生耶他然自人有離殺生於此無殺生耶他實不應如是言乃至自天有離穀酒木酒酒精分之逸處於此無穀酒木酒酒精分之放逸處耶他然自人有離穀酒木酒酒精分之放逸處於此無酒木酒酒精分之放逸處耶他實不應如是言乃至八他天無律儀耶自然他一切天有殺生不與取欲邪行虛誑語穀酒木酒酒精分之放逸處耶自實不應如是言乃至他故言天有律儀第十一章無想論名無想論以行緣而有識之語無識而不名結生由想生之時彼諸天其身沒之語無想有情亦死生剎那有想之執此乃安達派一自無想有情有想耶他然自是想有想趣想有情居想輪回想胎想我性得耶他實不應如是言乃至自非無想有無想趣無想有情居無想輪回無想胎無想我性得耶他然自若是無想有無想趣無想有情居無想輪回無想胎無想我性得者汝不應言無想有情有想二自無想有情有想耶他然自是五蘊有趣有情居輪回胎我性得耶他實不應如是言乃至自非為一蘊有趣有情居胎我性得耶他然自若一蘊有趣有情居輪回胎我性得者汝不應言無想有情有想三自無想有情有想耶他然自依其想而是想所作耶他實不應如是言乃至自人有想彼是想有想趣想有情居想輪回想胎想我性得耶他然自無想有情有想彼是想性想趣想有情居想輪回想胎想我性得耶他實不應如是言乃至自人有想彼是五蘊有趣有情居輪回胎我性得耶他然自無想有情有想彼是五蘊有趣有情居輪回胎我性得耶他然實不應如是言乃至自人有想依其想而是想所作耶他然自無想有情有想依其想而是想所作耶他實不應如是言乃至四自無想有情有想彼是無想有無想趣無想有情居無想輪回無想胎無想我性得耶他然自人有想彼是無想有乃至無想我性得耶他實不應如是言乃至自無想有情有想彼是一蘊有趣乃至自性得耶他然自人有想彼是一蘊有趣乃至自性得耶他實不應如是言乃至自無想有情有想依其想而不是想所作耶他然自人有想依其想而不為想所作耶他實不應如是言乃至五他不應言無想有情有想耶自然他非世尊所仰耶曰諸比丘名無想有情天想生之時彼之諸天其身沒有如是之經耶自然他依此應言無想有情有想六自無想有情有想耶他某時有某時無自某時有想有情某時有無想有情某時而想有某時有無想有某時有五蘊有某時有一蘊有耶他實不應如是言乃至七自無想有情有時想有有時無耶他然自如何之時有如何之時無耶他死生之時有住之時無自死及生之時有想有情住之時是無想有情於死生之時是想有住之時是無想有死生之時是五蘊有住之時是一蘊有耶他實不應如是言乃至第十二章非想非非想處論此處名非想非非想於此有彼由非想非非想之語言於彼不應言有想之執即安達派一自不應言於非想非非想處有想耶他然自是無想有無想趣無想有情居無想輪回無想胎無想我性得耶他然自若有無想有無想趣乃至無想我性得汝不可言不應言非想非非想處有想二自不應言於非想非非想處有想耶他然自是一蘊有趣乃至我性得耶他實不應如是言乃至自是四蘊有趣乃至我性得耶他然自若是四蘊有乃至我性得者汝不可言不應言非想非非想處有想三自不應言於無想有情有想尚且彼是無想有無想趣無想有情居無想輪回無想胎無想我性得耶他然自不應言於非想非非想處有想尚且彼是無想有無想趣無想有情居無想輪回無想胎無想我性得耶他實不應如是言乃至自不應言於無想有情有想尚且彼是一蘊有趣乃至我性得耶他然自不應言於非想非非想處有想尚且彼是一蘊有趣乃至我性得耶他實不應如是言乃至四自不應言於非想非非想處有想尚且彼是想有想趣乃至想自性得耶他然自不應言於無想有情有想尚且彼是想有想趣乃至想我性得耶他實不應如是言乃至自不應言於非想非非想處有想尚且彼是四蘊有趣乃至我性得耶他然自不應言於無想有情有想尚且彼是四蘊有趣乃至自性得耶他實不應如是言乃至五自不應言於非想非非想處有想耶他然自非想非非想處非是四蘊有耶他然自若非想非非想處是四蘊有者汝不可言不應言於非想非非想處有想六自非想非非想處是四蘊有而不應言於非想非非想處有想耶他然自空無邊處是四蘊有而不應言於空無邊處有想耶他實不應如是言乃至自非想非非想處是四蘊有而不應言於非想非非想處有想耶他然自識無邊處乃至無所有處是四蘊有而不應言無所有處有想他實不應如是言乃至七自空無邊處四蘊有於此有想耶他然自非想非非想處是四蘊有於此有想耶他實不應如是言乃至自識無邊處乃至無所有處是四蘊有於此有想耶他然自非想非非想處是四蘊有於此有想耶他實不應如是言乃至八自不應言非想非非想處有想或無耶他然自非想非非想處乃非四蘊有耶他然自若非想非非想處是四蘊有汝不應言不應言非想非非想處有想或無九自非想非非想處是四蘊有不應言非想非非想處有想或無耶他然自空無邊處乃至識無處乃至無所有處是四蘊有不應言無所有處有想或無一自空無邊處是四蘊有於此有想耶他然自非想非非想處是四蘊有於此有想耶他實不應如是言乃至自識無邊處乃至無所有處是四蘊有於此有想耶他然自非想非非想處是四蘊有於此有想耶他實不應如是言一一自不應言非想非非想處有想或無耶他然他非是非想非非想處耶自然他若是非想非非想處依此汝應言不應言非想非非想處有想或無一二自依非想非非想處而不應言非想非非想處有想或無耶他然自依不苦不樂受不應言於不苦不樂受受或不受耶他實不應如是言乃至彼之攝頌曰力聖有貪心是解脫已解脫是正解脫於心正解脫於第八人見纏捨棄於第八人無五根持法眼與耳如業所往智於天律儀於無想為想如有頂天第三品終
